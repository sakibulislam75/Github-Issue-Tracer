<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=home.html">
    <!-- Tailwind+DaisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Login</title>
</head>

<body>
    <section class="flex justify-center items-center h-screen ">
        <fieldset class="fieldset bg-white border-base-300 rounded-box w-md border p-7">
            <img src="./assets/github-logo.png" alt="" class="mx-auto">
            <h3 class="text-[#1F2937] text-xl text-center font-semibold">GitHub Issues Tracker</h3>
            <p class="text-center text-[#64748B]">Sign in to manage your issues</p><br>
            <label class=" text-l font-bold">User Name</label>
            <input id="userName" type="email" class="input w-full" placeholder="Enter  Username" />
            <p class="label text-blue-500">Default: admin</p><br>

            <label class="text-l font-bold ">Password</label>
            <input id="password" type="password" class="input w-full" placeholder="Enter Password" />
            <p class="label text-blue-500">Default: admin123</p>

            <button class="btn btn-primary mt-4" id="login">Login</button>
            <div class="flex items-center gap-3 pt-2">
                <hr class="flex-1 border-gray-300">
                <span>OR</span>
                <hr class="flex-1 border-gray-300">
            </div>
            <div>
                <p class="text-center">Demo Credentials:</p>
                <div class="bg-[#F8FAFC] p-4 "><br>
                    <p class="text-center"><span class="font-semibold text-center">Username: </span>admin</p>
                    <p class="text-center"><span class="font-semibold ">Password: </span>admin123</p>
                </div>


            </div>
        </fieldset>
    </section>
    <script src="./script/login.js"></script>
</body>

</html>
