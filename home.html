<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind+DaisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"
    />
    <title>Homepage</title>
</head>

<body class="bg-base-100">
    <!-- header -->
    <header>
        <div class="navbar bg-base-100 shadow-sm flex flex-col gap-4 md:flex-row justify-between">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl "><img src="./assets/github-logo.png" alt="" height="30" width="30"> GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="Type title + enter issues btn" id='search' class="input input-bordered w-24 md:w-auto" />
                <div class="dropdown dropdown-end">
                    <button class="btn btn-primary" id='issues'>+ New Issues</button>

                </div>
            </div>
        </div>
    </header>
    <!-- button -->
    <section class="w-11/12 mx-auto bg-white shadow-sm my-5 space-x-2.5 p-3 mt-6">
        <button id="all" onclick="toggleStyle('all')" class="btn btn-primary selected text-white">All</button>
        <button id="open" onclick="toggleStyle('open')" class="btn bg-gray-100">Open</button>
        <button id="close" onclick="toggleStyle('close')" class="btn  bg-gray-100">Closed</button>
    </section>
    <!-- total-issues -->
    <section class="w-11/12 mx-auto bg-white shadow-sm my-5 space-x-2.5 p-3 mt-7">
        <div class="flex justify-between">
            <div class="flex gap-2 items-center">
                <div><img src="./assets/Aperture.png" alt="" class="bg-gray-100 rounded-full p-2"></div>
                <div>
                    <p><span id="total-issues"></span><span class="font-bold"> Issues</span></p>
                    <h3>Track and manage your project issues</h3>
                </div>
            </div>
            <div class="flex gap-4 items-center">
                <p class="flex items-center gap-1"><span class="inline-block bg-green-400 p-2 rounded-full "></span> Open</p>
                <p class="flex items-center gap-1"><span class="inline-block bg-blue-400 p-2 rounded-full "></span> Closed</p>
            </div>
        </div>
    </section>
    <!-- card-container -->
    <section id="container" class="grid grid-cols-1 md:grid-cols-4 gap-2.5 w-11/12 mx-auto bg-base-100 mb-5">

    </section>

    <!-- Modal -->
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box rounded-2xl p-6 flex flex-col gap-4">

            <!-- Title -->
            <h2 id="modal-title" class="text-2xl font-bold"></h2>

            <!-- Status + author + date -->
            <div class="flex items-center gap-2 text-sm text-gray-500 flex-wrap">
                <span class="bg-green-500 text-white rounded-full px-3 py-1 text-xs font-semibold">Opened</span>
                <span>•</span>
                <span id="modal-author"></span>
                <span>•</span>
                <span id="modal-date"></span>
            </div>

            <!-- Labels -->
            <div id="modal-labels" class="flex gap-2 flex-wrap"></div>

            <!-- Description -->
            <p id="modal-description" class="text-sm text-gray-500"></p>

            <!-- Assignee + Priority -->
            <div class="bg-gray-50 rounded-xl p-4 flex gap-60 items-center">
                <div>
                    <p class="text-sm text-gray-400">Assignee:</p>
                    <p id="modal-assignee" class="font-bold text-sm"></p>
                </div>
                <div class="space-y-2">
                    <p class="text-sm text-gray-400">Priority:</p>
                    <span id="modal-priority" class="bg-red-500 text-white text-xs font-bold rounded-full px-5 py-2"></span>
                </div>
            </div>

            <!-- Close button -->
            <div class="modal-action mt-0">
                <form method="dialog">
                    <button class="btn bg-purple-600 text-white border-none rounded-xl px-6">Close</button>
                </form>
            </div>

        </div>
    </dialog>
    <script src="./script/homepage.js"></script>
</body>

</html>
